# Flat (non-ESPN) API family: NHL EDGE player/team tracking (api-web.nhle.com).
# Faithful port of sdv-py tools/codegen/endpoints/nhl_edge.yaml — Python-only
# codegen fields dropped. Shares the api-web.nhle.com host with nhl_api_web but
# is a separate `api` stem. Each endpoint names a parser in
# src/parsers/_registry.ts. (Note: the `*_top_10` paths are kept for
# forward-compat; they 404 live as of the upstream capture.)
api: nhl_edge
host: https://api-web.nhle.com
name_pattern: nhl_edge_{short}
endpoints:
- short: skater_detail
  path: /v1/edge/skater-detail/{player_id}/{season}/{game_type}
  path_params:
  - name: player_id
    type: int
    required: true
  - name: season
    type: int|str
    required: false
  - name: game_type
    type: int
    required: false
    default: 2
  parser: parse_edge_detail
  returns_schema: native/nhl_edge/skater_detail
- short: skater_comparison
  path: /v1/edge/skater-comparison/{player_id}/{season}/{game_type}
