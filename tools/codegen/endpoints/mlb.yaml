# Flat (non-ESPN) API family: the official MLB Stats API (statsapi.mlb.com).
# Unlike the ESPN families, `host` is an absolute base URL and the endpoint
# `path` is appended verbatim (with simple {token} substitution). Each endpoint
# names a parser in src/parsers/_registry.ts. This is the full ~64-endpoint port
# of the Stats API surface from sportsdataverse-py (tools/codegen/endpoints/
# mlb.yaml); the dedicated game / standings / stats parsers do extra
# unrolling, everything else falls through to the generic `parse_mlb_list`.
api: mlb
host: https://statsapi.mlb.com
name_pattern: mlb_{short}
endpoints:
- short: teams
  path: /api/v1/teams
  extra_params:
  - name: sport_id
    query_key: sportId
    type: int
    default: 1
  - name: season
    query_key: season
    type: int
  - name: league_ids
    query_key: leagueIds
    type: int|List[int]
  - name: active_status
    query_key: activeStatus
    type: str
  - name: hydrate
    query_key: hydrate
    type: str
  - name: fields
    query_key: fields
    type: str
  parser: parse_mlb_teams
- short: schedule
  path: /api/v1/schedule
  extra_params:
  - name: sport_id
    query_key: sportId
    type: int
    default: 1
