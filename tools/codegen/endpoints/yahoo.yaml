# Yahoo Sports stats-graph (graphite-secure.sports.yahoo.com).
#
# AUTO-EMITTED skeleton from sdv-swagger/yahoo-sports-shangrila.openapi.yaml via
#   node tools/codegen/from-openapi.mjs <spec> --api yahoo
# then HAND-CLEANED: trimmed the verbose operationId stems
# down to the GraphQL query name (`league_standings` / `player_season_stats` /
# `season_stats_football_passing_ncaaf` / ...). The $ref-resolving transform
# restores every query param from the spec's `components.parameters`
# automatically (315 `$ref` params across 105 queries — no hand-restore).
#
# Merges onto the standalone `yahoo` namespace (sdv.yahoo.*) — NOT a league.
# Shares the `yahoo` namespace with the scoreboard/boxscore feed (two hosts,
# one namespace). Methods: sdv.yahoo.yahoo_<short> / yahoo<Short>.
#
# SHAPE: GraphQL persisted-query backend — the last path segment is the query
# name. Every response is the GraphQL envelope {data, extensions}; `data` has a
# single root field (`leagues` / `games` / `players` / `teams` / `olympics`)
# holding the rows. The generic `parse_yahoo_list` unwraps `data`,
# takes the first root field, and flattens it; the stats queries (leagueStats* /
# seasonStats* / seasonTeamStats* / *StatsLeaders) route to
# `parse_yahoo_stats`, which unrolls the nested per-player/leader
# stat arrays (`leagues[].{footballStats|leaders}[]`) into one row each.
#
# AUTH: keyless (the spec ships no securityScheme), so NOT `auth: true`. Yahoo
# rejects requests without browser-y `Origin` / `Referer` headers, so the caller
# supplies those via the flat `headers` arg, e.g.
#   sdv.yahoo.yahoo_league_standings({
#     league: 'ncaaf',
#     headers: { Origin: 'https://sports.yahoo.com', Referer: 'https://sports.yahoo.com/' },
#   })
# Legacy seasonStats* queries are football-only (NCAAF data 2013+); modern
# generic queries cover all sports.
