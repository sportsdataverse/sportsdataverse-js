# (`{data: ...}` on success, `{error|errors|warnings: ...}` otherwise) — the
# spec carries no typed 200 `components.schemas`, so the returns schemas under
# tools/codegen/schemas/native/cbs/ are minimal (columns enumerated only
# where derivable from the path). Parsers (src/parsers/cbs.ts): the generic
# `parse_cbs_list` unwraps `{data}` + flattens the first list it finds and
# is the default; `scoreboard` / `standings` / `odds` get dedicated parsers
# that unroll their list payloads.
