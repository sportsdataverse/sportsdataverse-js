# Fox Sports "Bifrost" API (api.foxsports.com) flat-API family.
#
# AUTO-EMITTED skeleton from sdv-swagger/foxsports-api-openapi.yaml via
#   node tools/codegen/from-openapi.mjs <spec> --api fox_bifrost
# then HAND-CLEANED: the transform does not resolve `$ref` parameters, so it
# dropped every path param and emitted only one query param per endpoint. The
# clean-up below restores the {sport}/{eventId}/{teamId}/... path params,
# trims the verbose `get_bifrost_sport_*` operationId stems down to readable
# `short` names (scoreboard / event_data / team_roster / ...), and surfaces the
# query params from the spec's resolved `$ref`s.
#
# Merges onto the standalone `fox` namespace (sdv.fox.*) — NOT a league.
# Methods: sdv.fox.fox_bifrost_<short> / foxBifrost<Short>.
#
# AUTH: Fox Bifrost is a PUBLIC apikey + api-version query pair (no account /
# bearer token). The spec's `securitySchemes` are three apiKey-in-query schemes
# (`dataKey` / `feedKey` — both param `apikey` — and `apiVersion` — param
# `api-version`). So this family is NOT flagged `auth: true`; instead every
# endpoint declares `apikey` + `api_version` (query keys `apikey` / `api-version`)
# as extra_params WITH the spec's documented defaults, so calls work out of the
# box. Bifrost data-tier endpoints default to the data key; the feed-tier
# endpoints (trending / polls / fs) default to the feed key.
#
# RESPONSES: Fox's spec ships typed `components.schemas` inferred from captured
# responses across 11 sports, so the returns schemas under
# tools/codegen/schemas/native/fox_bifrost/ enumerate real columns where the
# 200 response names a schema; the untyped (`object`) responses carry an empty
# `columns: []` (parser snake_cases/flattens whatever the payload ships).
# Parsers (src/parsers/fox_bifrost.ts): the generic `parse_fox_bifrost_list`
# (unwraps the Bifrost group/section module shell and flattens the first list)
# is the default; scoreboard / standings / event / team_roster get dedicated
# parsers that unroll their nested-list shapes.
api: fox_bifrost
host: https://api.foxsports.com
endpoints:
# ---- scoreboard ---------------------------------------------------------
- short: scoreboard
  path: /bifrost/v1/{sport}/scoreboard/main
  parser: parse_fox_bifrost_scoreboard
  returns_schema: native/fox_bifrost/scoreboard
  path_params:
  - {name: sport, required: true}
  extra_params:
  - {name: apikey, query_key: apikey, default: jE7yBJVRNAwdDesMgTzTXUUSx1It41Fq}
  - {name: api_version, query_key: api-version, default: '1.1'}
  - {name: group_id, query_key: groupId}
- short: scorechip
  path: /bifrost/v1/{sport}/scorechip/{chip_id}
  parser: parse_fox_bifrost_list
  returns_schema: native/fox_bifrost/scorechip
  path_params:
  - {name: sport, required: true}
  - {name: chip_id, required: true}  # spec token {chipId} snake-cased to match name
  extra_params:
  - {name: apikey, query_key: apikey, default: jE7yBJVRNAwdDesMgTzTXUUSx1It41Fq}
  - {name: api_version, query_key: api-version, default: '1.1'}
- short: topevents_scoreboard_segment
  path: /bifrost/v1/topevents/scoreboard/segment/{segment}
  parser: parse_fox_bifrost_scoreboard
  returns_schema: native/fox_bifrost/topevents_scoreboard_segment
  path_params:
  - {name: segment, required: true}
  extra_params:
  - {name: apikey, query_key: apikey, default: jE7yBJVRNAwdDesMgTzTXUUSx1It41Fq}
  - {name: api_version, query_key: api-version, default: '1.1'}
