# Flat (non-ESPN) API family: Baseball Savant / Statcast (baseballsavant.mlb.com).
# Heterogeneous responses — CSV leaderboards (csv=true), JSON gamefeed/schedule,
# and a couple of HTML-embedded-JSON leaderboards. `host` is an absolute base
# URL and each endpoint `path` is appended verbatim. The `mlb_statcast` api stem
# is keyed into GETTER_OVERRIDES (src/leagues/_make_flat.ts) so a content-type-
# aware getter (src/core/statcast_runtime.ts) returns JSON objects for JSON
# bodies and raw text for CSV/HTML bodies — no per-endpoint flag needed. Port of
# sdv-py tools/codegen/endpoints/mlb_statcast.yaml (37 leaderboards incl. 2 HTML
# ones + gamefeed + schedule = 39 endpoints). Each endpoint names a parser in
# src/parsers/_registry.ts.
api: mlb_statcast
host: https://baseballsavant.mlb.com
name_pattern: mlb_statcast_{short}
endpoints:
- short: leaderboard_expected_stats
  path: /leaderboard/expected_statistics
  extra_params:
  - name: type
    query_key: type
    type: str
  - name: year
    query_key: year
    type: int|str
  - name: team
    query_key: team
    type: str
  - name: csv
    query_key: csv
    type: bool
    default: 'true'
  parser: parse_mlb_statcast_leaderboard
- short: leaderboard_percentile_rankings
  path: /leaderboard/percentile-rankings
