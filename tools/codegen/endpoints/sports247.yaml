# Flat (non-ESPN) API family: the 247Sports Recruit Database ("RDB") API
# (api.247sports.com /rdb/v1). Recruiting rankings, commits, transfers, team
# rankings, and tag/photo lookups for college recruiting.
#
# Generated from c:/…/sdv-swagger/247sports-recruit-database.openapi.yaml via
# `node tools/codegen/from-openapi.mjs <spec> --api sports247 --host
# https://api.247sports.com`, then hand-cleaned:
#   - dropped the redundant `rdb_` prefix every endpoint shared (the RDB silo
#     base) so method names read `sports247_rankings` / `sports247_recruits`;
#   - disambiguated the two `/tags/.../photos` routes (`tags_photos_by_key`
#     vs `tags_photos_by_type`).
#
# Merges onto the standalone `recruiting` namespace (sdv.recruiting.*) — NOT a
# league. Methods: sdv.recruiting.sports247_<short> / sports247<Short>.
#
# Auth NOTE: the spec declares a JWT `Authorization: Bearer {token}` header, but
# unlike nfl_api there is NO public token-minting machinery for 247 — the caller
# supplies their own JWT. So this family is NOT flagged `auth: true` (that path
# would try to mint a bearer via AUTH_HEADER_PROVIDERS, which 247 has no entry
# for). Pass your token per-call via the standard flat `headers` arg:
#   sdv.recruiting.sports247_rankings({ headers: { Authorization: 'Bearer …' } }).
#
# Parsers (src/parsers/sports247.ts) + returns schemas
# (tools/codegen/schemas/native/sports247/*.yaml) are authored on top of this
# skeleton. Most endpoints use the generic `parse_sports247_list` flattener;
# rankings/feed endpoints get dedicated parsers that unroll their list payloads.
api: sports247
host: https://api.247sports.com
endpoints:
- short: coaches
  path: /rdb/v1/coaches
  parser: parse_sports247_list
  returns_schema: native/sports247/coaches
  extra_params:
  - {name: sport_key, query_key: sportKey}
  - {name: year, query_key: year}
  - {name: page, query_key: page, default: 1}
  - {name: page_size, query_key: pageSize, default: 25}
