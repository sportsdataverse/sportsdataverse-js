# Flat (non-ESPN) API family: the modern NHL game-feed API (api-web.nhle.com).
# Faithful port of sdv-py tools/codegen/endpoints/nhl_api_web.yaml — the
# Python-only codegen fields (name_pattern, module, parser_module, qualifier,
# runtime_imports, returns_schema, summary, example_args, now_variant,
# now_toggle, transform) are dropped; `host` is an absolute base URL and each
# endpoint `path` is appended verbatim (with simple {token} substitution).
# Each endpoint names a parser in src/parsers/_registry.ts.
api: nhl_api_web
host: https://api-web.nhle.com
name_pattern: nhl_api_web_{short}
endpoints:
- short: pbp
  path: /v1/gamecenter/{game_id}/play-by-play
  path_params:
  - name: game_id
    type: int
    required: true
  parser: parse_nhl_web_pbp
  returns_schema: native/nhl_api_web/pbp
- short: boxscore
  path: /v1/gamecenter/{game_id}/boxscore
  path_params:
  - name: game_id
    type: int
    required: true
  parser: parse_nhl_web_boxscore
  returns_schema: native/nhl_api_web/boxscore
- short: landing
  path: /v1/gamecenter/{game_id}/landing
  path_params:
  - name: game_id
    type: int
    required: true
  parser: parse_nhl_web_landing
  returns_schema: native/nhl_api_web/landing
- short: right_rail
  path: /v1/gamecenter/{game_id}/right-rail
  path_params:
  - name: game_id
    type: int
    required: true
  parser: parse_nhl_web_right_rail
- short: schedule
  path: /v1/schedule/{date}
  path_params:
  - name: date
    type: str
    required: false
  parser: parse_nhl_web_schedule
  returns_schema: native/nhl_api_web/schedule
- short: score
  path: /v1/score/{date}
  path_params:
  - name: date
    type: str
    required: false
  parser: parse_nhl_web_score
  returns_schema: native/nhl_api_web/score
- short: schedule_calendar
  path: /v1/schedule-calendar/{date}
  path_params:
  - name: date
    type: str
    required: false
  parser: parse_nhl_web_schedule
- short: playoff_series
  path: /v1/schedule/playoff-series/{season}/{series_letter}
  path_params:
  - name: season
    type: int|str
    required: true
  - name: series_letter
    type: str
    required: true
  parser: parse_nhl_web_playoff_series
  returns_schema: native/nhl_api_web/playoff_series
- short: standings
  path: /v1/standings/{date}
  path_params:
  - name: date
    type: str
    required: false
  parser: parse_nhl_web_standings
  returns_schema: native/nhl_api_web/standings
- short: standings_season
  path: /v1/standings-season
  parser: parse_nhl_web_standings_season
  returns_schema: native/nhl_api_web/standings_season
- short: club_schedule_season
  path: /v1/club-schedule-season/{team}/{season}
  path_params:
  - name: team
    type: str
    required: true
  - name: season
    type: int|str
    required: false
  parser: parse_nhl_web_club_schedule
  returns_schema: native/nhl_api_web/club_schedule_season
- short: club_schedule_month
  path: /v1/club-schedule/{team}/month/{month}
  path_params:
  - name: team
    type: str
    required: true
  - name: month
    type: str
    required: false
  parser: parse_nhl_web_club_schedule
- short: club_schedule_week
  path: /v1/club-schedule/{team}/week/{date}
  path_params:
  - name: team
    type: str
    required: true
  - name: date
    type: str
    required: false
  parser: parse_nhl_web_club_schedule
- short: club_stats
  path: /v1/club-stats/{team}/{season}/{game_type}
  path_params:
  - name: team
    type: str
    required: true
  - name: season
    type: int|str
    required: false
  - name: game_type
    type: int
    required: false
    default: 2
  parser: parse_nhl_web_club_stats
- short: club_stats_season
  path: /v1/club-stats-season/{team}
  path_params:
  - name: team
    type: str
    required: true
  parser: parse_nhl_web_club_stats
- short: roster
  path: /v1/roster/{team}/{season}
  path_params:
  - name: team
    type: str
    required: true
  - name: season
    type: int|str
    required: false
  parser: parse_nhl_web_roster
  returns_schema: native/nhl_api_web/roster
- short: roster_season
  path: /v1/roster-season/{team}
  path_params:
  - name: team
    type: str
    required: true
  parser: parse_nhl_web_roster
- short: player_landing
  path: /v1/player/{player_id}/landing
  path_params:
  - name: player_id
    type: int
    required: true
  parser: parse_nhl_web_player_landing
  returns_schema: native/nhl_api_web/player_landing
- short: player_game_log
  path: /v1/player/{player_id}/game-log/{season}/{game_type}
  path_params:
  - name: player_id
    type: int
    required: true
  - name: season
    type: int|str
    required: false
  - name: game_type
    type: int
    required: false
    default: 2
  parser: parse_nhl_web_player_game_log
  returns_schema: native/nhl_api_web/player_game_log
- short: player_spotlight
  path: /v1/player-spotlight
  parser: parse_nhl_web_player_spotlight
  returns_schema: native/nhl_api_web/player_spotlight
- short: skater_leaders
  path: /v1/skater-stats-leaders/{season}/{game_type}
  path_params:
  - name: season
    type: int|str
    required: false
  - name: game_type
    type: int
    required: false
    default: 2
  parser: parse_nhl_web_leaders
  returns_schema: native/nhl_api_web/skater_leaders
- short: goalie_leaders
  path: /v1/goalie-stats-leaders/{season}/{game_type}
  path_params:
  - name: season
    type: int|str
    required: false
  - name: game_type
    type: int
    required: false
    default: 2
  parser: parse_nhl_web_leaders
  returns_schema: native/nhl_api_web/goalie_leaders
- short: draft_picks
  path: /v1/draft/picks/{year}/{round_}
  path_params:
  - name: year
    type: int|str
    required: true
  - name: round_
    type: int|str
    required: false
    default: all
  parser: parse_nhl_web_draft_picks
  returns_schema: native/nhl_api_web/draft_picks
- short: draft_rankings
  path: /v1/draft/rankings/{year}/{category}
  path_params:
  - name: year
    type: int|str
    required: true
  - name: category
    type: int
    required: false
    default: 1
  parser: parse_nhl_web_draft_rankings
  returns_schema: native/nhl_api_web/draft_rankings
- short: draft_picks_now
  path: /v1/draft/picks/now
  parser: parse_nhl_web_draft_picks
- short: draft_rankings_now
  path: /v1/draft/rankings/now
  parser: parse_nhl_web_draft_rankings
  returns_schema: native/nhl_api_web/draft_rankings_now
- short: draft_tracker_picks_now
  path: /v1/draft-tracker/picks/now
  parser: parse_nhl_web_draft_picks
