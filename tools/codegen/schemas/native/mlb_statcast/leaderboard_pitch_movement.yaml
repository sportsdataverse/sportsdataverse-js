- name: pitcher_break_x
  type: numeric
  description: "Pitcher break x."
- name: league_break_x
  type: numeric
  description: "League break x."
- name: diff_x
  type: numeric
  description: "Diff x."
- name: tail
  type: integer
  description: "Tail."
- name: percent_rank_diff_z
