  type: integer
  description: "Season year."
- name: last_name, first_name
  type: character
  description: "Last name, first name."
- name: pitcher_id
  type: integer
  description: "MLBAM id of the pitcher."
- name: team_name
  type: character
  description: "Team name."
- name: team_name_abbrev
  type: character
  description: "Team name abbrev."
- name: pitch_hand
  type: character
  description: "Pitcher handedness (R/L)."
- name: avg_speed
