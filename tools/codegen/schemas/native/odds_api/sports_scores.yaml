schema: sports_scores
kind: dataframe
columns:
- name: id
  type: character
  description: A unique 32 character identifier for the event.
- name: sport_key
  type: character
  description: A unique slug for the sport, e.g. `basketball_nba`. Use this as the `sport` param in /odds requests.
- name: sport_title
  type: character
  description: A presentable title of the sport, e.g. `NBA`. Occasionally this value can change (for example, if a league undergoes a name change or change in sponsorship).
- name: commence_time
  type: character
  description: The match start time (ISO 8601 formatted). Will be a unix timestamp integer if the `dateFormat` query param is set to `unix`.
- name: completed
  type: logical
  description: '`TRUE` if the event has finished, otherwise `FALSE`.'
- name: home_team
  type: character
  description: The home team. If home/away is not applicable for the sport (such as MMA and Tennis), it will be one of the participants. Null for outrights (futures) events.
- name: away_team
  type: character
  description: The away team. If home/away is not applicable for the sport (such as MMA and Tennis), it will be one of the participants. Null for outrights (futures) events.
- name: scores
  type: list
  description: A list of teams and their scores (per-team `name`/`score` pairs, stringified). Empty / `NULL`/`NA` if the event has not started.
- name: last_update
  type: character
  description: ISO 8601 datetime of when the scores were last updated. `NA`/null until the event has started.
