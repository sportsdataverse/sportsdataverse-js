schema: sports_events_history
kind: dataframe
columns:
- name: timestamp
  type: character
  description: The timestamp of the snapshot. This will be the closest available timestamp equal to or earlier than the provided `date` parameter.
- name: previous_timestamp
  type: character
  description: The preceding available timestamp. Use as the `date` parameter in a new request to move back in time.
- name: next_timestamp
  type: character
  description: The next available timestamp. Use as the `date` parameter in a new request to move forward in time.
- name: id
  type: character
  description: A unique 32 character identifier for the event. Use as `event_id` elsewhere.
- name: sport_key
  type: character
  description: A unique slug for the sport, e.g. `basketball_nba`. Use this as the `sport` param in /odds requests.
- name: sport_title
  type: character
  description: A presentable title of the sport, e.g. `NBA`. Occasionally this value can change (for example, if a league undergoes a name change or change in sponsorship).
- name: commence_time
  type: character
  description: The match start time (ISO 8601 formatted). Will be a unix timestamp integer if the `dateFormat` query param is set to `unix`.
- name: home_team
  type: character
  description: The home team. If home/away is not applicable for the sport (such as MMA and Tennis), it will be one of the participants. Null for outrights (futures) events.
- name: away_team
  type: character
  description: The away team. If home/away is not applicable for the sport (such as MMA and Tennis), it will be one of the participants. Null for outrights (futures) events.
- name: home_rotation
  type: integer
  description: The rotation number of the home team. Only returned when `include_rotation_numbers = TRUE`; can be null. Available in historical data from November 2025.
- name: away_rotation
  type: integer
  description: The rotation number of the away team. Only returned when `include_rotation_numbers = TRUE`; can be null. Available in historical data from November 2025.
