schema: event_markets
kind: dataframe
columns:
- name: id
  type: character
  description: A unique 32 character identifier for the event (echoes `event_id`).
- name: sport_key
  type: character
  description: A unique slug for the sport, e.g. `basketball_nba`. Use this as the `sport` param in /odds requests.
- name: sport_title
  type: character
  description: A presentable title of the sport, e.g. `NBA`. Occasionally this value can change (for example, if a league undergoes a name change or change in sponsorship).
- name: commence_time
  type: character
  description: The match start time (ISO 8601 formatted). Will be a unix timestamp integer if the `dateFormat` query param is set to `unix`.
- name: home_team
  type: character
  description: The home team. If home/away is not applicable for the sport (such as MMA and Tennis), it will be one of the participants. Null for outrights (futures) events.
- name: away_team
  type: character
  description: The away team. If home/away is not applicable for the sport (such as MMA and Tennis), it will be one of the participants. Null for outrights (futures) events.
- name: bookmaker_key
  type: character
  description: A unique slug (key) of the bookmaker, e.g. `draftkings`.
- name: bookmaker
  type: character
  description: A formatted title of the bookmaker, e.g. `DraftKings`.
- name: market_key
  type: character
  description: The unique key for an available odds market offered by the bookmaker, e.g. `player_points`.
- name: market_last_update
  type: character
  description: A timestamp of when the market's odds were last read. Will be an integer if `dateFormat=unix`, otherwise a string.
