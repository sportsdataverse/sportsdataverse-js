schema: event_markets
kind: dataframe
columns:
- name: id
  type: character
  description: Unique event id (echoes `event_id`).
- name: sport_key
  type: character
  description: Sport key, e.g. `basketball_nba`.
- name: sport_title
  type: character
  description: Human-readable sport title, e.g. `NBA`.
- name: commence_time
  type: character
  description: Event start time (ISO 8601 string or unix seconds).
- name: home_team
  type: character
  description: Home team name.
- name: away_team
  type: character
  description: Away team name.
- name: bookmaker_key
  type: character
  description: Bookmaker slug, e.g. `draftkings`.
- name: bookmaker
  type: character
  description: Bookmaker display title, e.g. `DraftKings`.
- name: market_key
  type: character
  description: Available market key, e.g. `player_points`.
- name: market_last_update
  type: character
  description: When this market was last seen for the bookmaker.
