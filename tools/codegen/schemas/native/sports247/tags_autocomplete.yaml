# One row per tag autocomplete match (TagDto).
# Columns produced by the sports247 parser's snake_cased, flattened output.
schema: tags_autocomplete
kind: dataframe
columns:
- name: id
  type: character
  description: "id"
- name: name
  type: character
  description: "name"
- name: type
  type: character
  description: "type"
- name: annotation
  type: character
  description: "annotation"
