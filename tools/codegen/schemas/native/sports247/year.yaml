# One row per ranking year (YearBaseRankingDto).
# Columns produced by the sports247 parser's snake_cased, flattened output.
schema: year
kind: dataframe
columns:
- name: ranking_key
  type: numeric
  description: "ranking key"
- name: label
  type: character
  description: "label"
- name: value
  type: character
  description: "value"
