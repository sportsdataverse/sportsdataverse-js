schema: game_stats
kind: dataframe
columns:
- name: date
  type: character
  description: 'Game date (M/D/YY).'
- name: type
  type: integer
  description: 'Game-type flag.'
- name: team
  type: character
  description: 'Team name.'
- name: conf
  type: character
  description: 'Team conference.'
- name: opp
  type: character
  description: 'Opponent.'
- name: venue
  type: character
  description: 'Venue (H/A/N).'
- name: result
  type: character
  description: 'Result string.'
- name: adj_oe
  type: numeric
  description: 'Adjusted offensive efficiency.'
- name: adj_de
  type: numeric
  description: 'Adjusted defensive efficiency.'
- name: oe
  type: numeric
  description: 'Raw offensive efficiency (points/100 poss).'
- name: off_efg
  type: numeric
  description: 'Offensive effective FG%.'
- name: off_to
  type: numeric
  description: 'Offensive turnover %.'
- name: off_or
  type: numeric
  description: 'Offensive rebound %.'
- name: off_ftr
  type: numeric
  description: 'Offensive free-throw rate.'
- name: de
  type: numeric
  description: 'Raw defensive efficiency (points allowed/100 poss).'
- name: def_efg
  type: numeric
  description: 'Defensive effective FG% allowed.'
- name: def_to
  type: numeric
  description: 'Defensive turnover % forced.'
- name: def_or
  type: numeric
  description: 'Defensive (opponent) rebound %.'
- name: def_ftr
  type: numeric
  description: 'Defensive free-throw rate allowed.'
- name: game_score
  type: numeric
  description: 'Bart Torvik single-game quality score.'
- name: opp_conf
  type: character
  description: 'Opponent conference.'
- name: quad
  type: integer
  description: 'NCAA quadrant (1-4) of the game.'
- name: year
  type: integer
  description: 'Season (4-digit ending-year).'
- name: tempo
  type: numeric
  description: 'Game tempo (possessions).'
- name: muid
  type: character
  description: 'Matchup unique id.'
- name: coach
  type: character
  description: 'Team head coach.'
- name: opp_coach
  type: character
  description: 'Opponent head coach.'
- name: margin
  type: numeric
  description: 'Final scoring margin.'
- name: win_prob
  type: numeric
  description: 'Pre-game win probability.'
- name: game_stats
  type: character
  description: 'Nested per-game stat array (;-joined).'
- name: overtimes
  type: integer
  description: 'Number of overtimes.'
