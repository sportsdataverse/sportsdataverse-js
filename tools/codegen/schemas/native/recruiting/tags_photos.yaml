# One row per tag photo (ImageDto).
# Columns produced by the recruiting parser's snake_cased, flattened output.
schema: tags_photos
kind: dataframe
columns:
- name: key
  type: numeric
  description: "key"
- name: user_key
  type: numeric
  description: "user key"
- name: source_key
  type: numeric
  description: "source key"
- name: date
  type: character
  description: "date"
- name: name
  type: character
  description: "name"
- name: description
  type: character
  description: "description"
- name: thumbnail
  type: character
  description: "thumbnail"
- name: file_type
  type: character
  description: "file type"
- name: height
  type: numeric
  description: "height"
- name: width
  type: numeric
  description: "width"
- name: duration
  type: numeric
  description: "duration"
- name: url
  type: character
  description: "url"
