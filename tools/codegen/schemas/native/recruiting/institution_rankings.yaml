# One row per ranked institution (InstitutionRankingDto), with pagination_* context prefixed.
# Columns produced by the recruiting parser's snake_cased, flattened output.
schema: institution_rankings
kind: dataframe
columns:
- name: pagination_count
  type: numeric
  description: "Paging context: count."
- name: pagination_offset
  type: numeric
  description: "Paging context: offset."
- name: pagination_limit
  type: numeric
  description: "Paging context: limit."
- name: pagination_items_per_page
  type: numeric
  description: "Paging context: items per page."
- name: pagination_current_page
  type: numeric
  description: "Paging context: current page."
- name: pagination_page_count
  type: numeric
  description: "Paging context: page count."
- name: name
  type: character
  description: "name of the institution"
- name: conference_rank
  type: numeric
  description: "conference Transfer Rank"
- name: conference_composite_rank
  type: numeric
  description: "conference Transfer Ranking Composite Rank"
- name: rank
  type: numeric
  description: "Transfer Rank"
- name: composite_rank
  type: numeric
  description: "Transfer Ranking Composite Rank"
- name: institution_key
  type: numeric
  description: "unique identifier of the institution"
- name: team_key
  type: numeric
  description: "unique identifier of the team"
- name: average_rating
  type: numeric
  description: "average rating"
- name: rating
  type: numeric
  description: "team rating"
- name: composite_rating
  type: numeric
  description: "team composite rating"
- name: average_composite_rating
  type: numeric
  description: "average composite rating"
- name: default_asset
  type: character
  description: "institution default logo"
- name: alternate_asset
  type: character
  description: "an alternate institution logo"
- name: high_school_ranking_position
  type: numeric
  description: "high school rankingposition"
- name: transfer_points
  type: numeric
  description: "transfer points for the institution"
- name: transfer_number
  type: numeric
  description: "number of transfers for the institution"
- name: five_stars
  type: numeric
  description: "five star count"
- name: composite_five_stars
  type: numeric
  description: "composite five star count"
- name: four_stars
  type: numeric
  description: "four star count"
- name: composite_four_stars
  type: numeric
  description: "composite four star count"
- name: three_stars
  type: numeric
  description: "three star count"
- name: composite_three_stars
  type: numeric
  description: "composite three star count"
- name: commits
  type: numeric
  description: "commit count"
- name: site_key
  type: numeric
  description: "site key"
- name: institution_root_path
  type: character
  description: "Team Site Url"
- name: ranking_date
  type: character
  description: "ranking date"
- name: city
  type: character
  description: "city"
- name: state
  type: character
  description: "state"
- name: institution_ranking_url
  type: character
  description: "institution ranking url"
